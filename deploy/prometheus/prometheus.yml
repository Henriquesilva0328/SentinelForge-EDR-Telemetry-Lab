global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: sentinelforge_api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - host.docker.internal:8000

  - job_name: sentinelforge_normalizer
    static_configs:
      - targets:
          - host.docker.internal:9101

  - job_name: sentinelforge_detector
    static_configs:
      - targets:
          - host.docker.internal:9102