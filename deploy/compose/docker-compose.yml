services:
  postgres:
    image: postgres:17-alpine
    container_name: sentinelforge-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: sentinelforge
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel1

    ports:
      - "5433:5432"

    volumes:
      - sentinelforge_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelforge"]
      interval: 10s
      timeout: 5s
      retries: 5
  kafka:
    image: apache/kafka:4.1.2
    container_name: sentinelforge-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinelforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: sentinelforge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    extra_hosts:
      - "host.docker.internal:host-gateway"    
volumes:
  sentinelforge_postgres_data: